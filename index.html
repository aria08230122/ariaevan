<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>念培的字卡网站</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
body{
    background:#cbc6bc;
    height:90vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}
.app{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
}
.chat{
    flex:1;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    min-height:0;
}

/* ---------------- 启动加载页 ---------------- */
.startup-screen{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,var(--loader-bg1,#d8d1c9),var(--loader-bg2,#ece6df));
    transition:opacity .55s ease, visibility .55s ease;
}
.startup-screen.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
}
.startup-screen::before{
    content:"";
    position:absolute;
    width:46vmax;
    height:46vmax;
    border-radius:50%;
    background:radial-gradient(circle,var(--loader-halo,rgba(180,160,145,.22)),transparent 68%);
    filter:blur(12px);
    transform:translate(-20%,-16%);
}
.startup-screen::after{
    content:"";
    position:absolute;
    width:34vmax;
    height:34vmax;
    right:-6vmax;
    bottom:-8vmax;
    border-radius:50%;
    background:radial-gradient(circle,var(--loader-halo-2,rgba(150,165,155,.18)),transparent 70%);
    filter:blur(12px);
}
.startup-card{
    position:relative;
    z-index:1;
    min-width:250px;
    padding:30px 34px;
    border-radius:30px;
    background:rgba(255,255,255,.36);
    border:1px solid rgba(255,255,255,.42);
    box-shadow:0 18px 48px rgba(0,0,0,.08);
    backdrop-filter:blur(10px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}
.startup-icon{
    width:72px;
    height:72px;
    color:var(--loader-accent,#b49a8a);
}
.startup-icon svg{
    width:100%;
    height:100%;
    stroke:currentColor;
    fill:none;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
}
.startup-text{
    color:var(--loader-text,#6a6059);
    font-size:1rem;
    letter-spacing:.08em;
}
.startup-line{
    width:132px;
    height:4px;
    border-radius:999px;
    overflow:hidden;
    position:relative;
    background:rgba(255,255,255,.44);
}
.startup-line::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:42%;
    border-radius:999px;
    background:linear-gradient(90deg,transparent,var(--loader-accent,#b49a8a),transparent);
    animation:startupSlide 1.35s infinite ease-in-out;
}
@keyframes startupSlide{
    0%{transform:translateX(-120%)}
    100%{transform:translateX(260%)}
}

/* ---------------- 聊天头部 ---------------- */
.chat-header{
    padding:8px 12px;
    background:var(--header-color,#d2e6ec);
    border-bottom:1px solid #c0d4db;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    transition:background-color .2s;
}
.peer-info,.self-info{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
}
.peer-info{justify-content:flex-start;flex:1}
.self-info{justify-content:flex-end;flex:1}
.avatar{
    width:36px;
    height:36px;
    background:#d1d1d1;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1rem;
    font-weight:450;
    color:#5a5a5a;
    text-transform:uppercase;
    cursor:pointer;
    flex-shrink:0;
    overflow:hidden;
}
.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.info-text{
    display:flex;
    flex-direction:column;
    height:36px;
    min-width:0;
}
.peer-info .info-text{align-items:flex-start}
.self-info .info-text{align-items:flex-end}
.name{
    font-size:var(--name-font-size,.8rem);
    font-weight:500;
    color:#5a5a5a;
    cursor:pointer;
    padding:2px 4px;
    border-radius:12px;
}
.name:hover{background:rgba(225,178,178,.2)}
.status{
    font-size:.55rem;
    color:#8a8a8a;
    cursor:pointer;
    padding:0 4px;
    border-radius:8px;
}
.status:hover{background:rgba(225,178,178,.1)}
.center-icons{
    display:flex;
    gap:8px;
    margin:0 4px;
}
.icon-btn{
    background:transparent;
    border:none;
    font-size:1.2rem;
    color:#8a8a8a;
    cursor:pointer;
    width:36px;
    height:36px;
    border-radius:50%;
    transition:.2s;
}
.icon-btn:hover{background:rgba(225,178,178,.3)}

/* ---------------- 消息区域 ---------------- */
.messages-container{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    position:relative;
    isolation:isolate;
    background:#f1f5f6;
    transition:background-color .3s;
}
.messages-container::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:var(--chat-bg-image,none);
    background-size:cover;
    background-position:center;
    opacity:var(--chat-bg-opacity,1);
    filter:blur(var(--chat-bg-blur,0px));
    transform:scale(1.05);
}
.messages-container>*{
    position:relative;
    z-index:1;
}
.messages-container::-webkit-scrollbar{width:3px}
.messages-container::-webkit-scrollbar-track{background:#dbe1e2}
.messages-container::-webkit-scrollbar-thumb{background:#b6c4cb;border-radius:4px}

.message-row{
    display:flex;
    width:100%;
}
.message-row.me{justify-content:flex-end}
.message-row.contact{justify-content:flex-start}
.message-bubble{
    max-width:75%;
    padding:8px 12px;
    border-radius:18px;
    word-wrap:break-word;
    backdrop-filter:blur(2px);
    font-size:var(--bubble-font-size,.85rem);
    cursor:pointer;
    transition:background .1s,color .1s,transform .08s;
}
.message-bubble:active{
    transform:scale(.99);
}
.quote-indicator{
    font-size:calc(var(--bubble-font-size,.85rem) * .9);
    color:#8a8a8a;
    border-left:2px solid #e1b2b2;
    padding-left:6px;
    margin-bottom:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.message-time{
    font-size:calc(var(--bubble-font-size,.85rem) * .7);
    color:#8a8a8a;
    text-align:right;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:4px;
    margin-top:4px;
}
.receipt{
    font-size:calc(var(--bubble-font-size,.85rem) * .9);
}
.receipt.read{
    color:#5a9eff;
}
.typing-indicator{
    opacity:0;
    transition:opacity .2s;
}
.typing-indicator.show{
    opacity:1;
}
.typing-bubble{
    background:rgba(219,229,241,.8);
    padding:8px 16px;
    border-radius:24px;
    display:inline-flex;
    gap:4px;
}
.typing-bubble span{
    width:4px;
    height:4px;
    background:#5a5a5a;
    border-radius:50%;
    animation:typing 1.4s infinite;
}
@keyframes typing{
    0%,60%,100%{transform:translateY(0);opacity:.4}
    30%{transform:translateY(-4px);opacity:1}
}
.empty-chat-placeholder{
    margin:auto;
    color:#8a8a8a;
    text-align:center;
    font-size:.95rem;
}

/* ---------------- 底部输入 ---------------- */
.chat-footer{
    padding:10px 16px;
    background:var(--header-color,#d2e6ec);
    border-top:1px solid #c0d4db;
    display:flex;
    gap:10px;
    align-items:center;
    flex-shrink:0;
    transition:background-color .2s;
}
.chat-footer input{
    flex:1;
    background:rgba(255,255,255,.8);
    border:1px solid #b8cfd8;
    border-radius:40px;
    padding:10px 16px;
    font-size:var(--bubble-font-size,.85rem);
    outline:none;
}
.chat-footer button{
    background:#d1d1d1;
    border:none;
    border-radius:50%;
    width:44px;
    height:44px;
    font-size:1.1rem;
    cursor:pointer;
}
.chat-footer button:hover{background:#e1b2b2}
.chat-footer button:disabled,
.panel button:disabled{
    opacity:.55;
    cursor:not-allowed;
}

/* ---------------- 浮层 ---------------- */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.1);
    backdrop-filter:blur(2px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2000;
    visibility:hidden;
    opacity:0;
    transition:.2s;
}
.overlay.show{
    visibility:visible;
    opacity:1;
}
.panel{
    width:380px;
    max-width:92%;
    max-height:82vh;
    background:#f1f5f6;
    border-radius:28px;
    padding:20px;
    overflow-y:auto;
    border:1px solid #d2e6ec;
}
.panel-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    color:#5a5a5a;
    font-weight:500;
}
.panel-header button{
    background:transparent;
    border:none;
    color:#8a8a8a;
    cursor:pointer;
    font-size:1.2rem;
}
.panel-header button:hover{
    color:#b34e4e;
}
.panel-footer{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
}
.panel-footer button{
    background:#d1d1d1;
    border:none;
    border-radius:30px;
    padding:8px 20px;
    cursor:pointer;
}
.panel-footer button:hover{
    background:#e1b2b2;
    color:#fff;
}

/* ---------------- 通用输入 ---------------- */
#new-wordcard-input,
#new-status,
#new-wordcard-group,
#wordcard-search{
    border:1px solid #d2e6ec;
    border-radius:20px;
    padding:10px 12px;
    background:#fff;
    outline:none;
}
#new-wordcard-input,
#new-status{
    flex:1;
}
#wordcard-search{
    width:100%;
    margin-bottom:12px;
}
#add-wordcard,
#add-status,
#new-contact,
#upload-wordcard,
#export-wordcard,
#reset-bg,
#draw-one,
#draw-three{
    background:#d1d1d1;
    border:none;
    border-radius:20px;
    padding:10px 14px;
    cursor:pointer;
}
#add-wordcard:hover,
#add-status:hover,
#new-contact:hover,
#upload-wordcard:hover,
#export-wordcard:hover,
#reset-bg:hover,
#draw-one:hover,
#draw-three:hover{
    background:#e1b2b2;
    color:#fff;
}

/* ---------------- 字卡库分组 ---------------- */
.group-tabs{
    display:flex;
    overflow-x:auto;
    gap:8px;
    margin-bottom:16px;
    padding-bottom:8px;
    scrollbar-width:thin;
}
.group-tabs::-webkit-scrollbar{height:2px}
.group-tab{
    background:rgba(210,230,236,.6);
    border-radius:40px;
    padding:6px 14px;
    font-size:.8rem;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    flex-shrink:0;
}
.group-tab.active{
    background:#e1b2b2;
    color:#fff;
}
.group-tab .group-actions{
    display:none;
    gap:6px;
    margin-left:6px;
}
.group-tab.active .group-actions{
    display:inline-flex;
}
.group-actions i{
    cursor:pointer;
    font-size:.7rem;
}
.add-group-btn{
    background:transparent;
    border:1px dashed #b8cfd8;
    border-radius:40px;
    padding:6px 12px;
    cursor:pointer;
    flex-shrink:0;
}

/* ---------------- 列表项 ---------------- */
.wordcard-item,
.contact-item,
.status-item{
    background:#ffffffc0;
    border:1px solid #d2e6ec;
    border-radius:24px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
    gap:8px;
}
.wordcard-text{
    cursor:pointer;
    flex:1;
}
.wordcard-group-badge{
    font-size:.65rem;
    background:#d2e6ec;
    padding:2px 8px;
    border-radius:20px;
    margin-left:8px;
}
.wordcard-item button,
.contact-item button,
.status-item button{
    background:transparent;
    border:none;
    width:32px;
    height:32px;
    border-radius:50%;
    cursor:pointer;
    color:#5a5a5a;
}
.wordcard-item button:hover,
.contact-item button:hover,
.status-item button:hover{
    background:rgba(225,178,178,.25);
}
.contact-item{
    align-items:flex-start;
}
.contact-item.active{
    border-color:#e1b2b2;
    background:#fff7f7;
}
.contact-main{
    flex:1;
    min-width:0;
}
.contact-main strong{
    display:block;
    color:#4a453e;
}
.contact-sub{
    font-size:.72rem;
    color:#8a8a8a;
    margin-top:2px;
}
.contact-actions{
    display:flex;
    align-items:center;
    gap:4px;
}
.pin-contact.active{
    color:#b34e4e;
    background:rgba(225,178,178,.22);
}

/* ---------------- 塔罗牌 ---------------- */
.tarot-result{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:20px;
}
.tarot-card{
    text-align:center;
    width:120px;
    background:#fff9f0;
    border-radius:20px;
    padding:12px 8px;
    box-shadow:0 8px 18px rgba(0,0,0,.1);
}
.tarot-flip-wrap{
    width:100px;
    height:160px;
    margin:0 auto;
    perspective:1000px;
    cursor:pointer;
}
.tarot-flip-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .75s cubic-bezier(.2,.8,.2,1);
}
.tarot-card.revealed .tarot-flip-inner{
    transform:rotateY(180deg);
}
.tarot-face{
    position:absolute;
    inset:0;
    border-radius:12px;
    overflow:hidden;
    backface-visibility:hidden;
}
.tarot-back{
    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 45%),
        linear-gradient(135deg, #74539b, #3f2a5d);
    border:2px solid rgba(255,255,255,.25);
    display:flex;
    align-items:center;
    justify-content:center;
}
.tarot-back-inner{
    width:78px;
    height:138px;
    border:1px solid rgba(255,255,255,.35);
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:rgba(255,255,255,.06);
    color:#fff6d9;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
}
.tarot-back-inner i{
    font-size:1.5rem;
}
.tarot-front{
    transform:rotateY(180deg);
    background:#f3e9d2;
}
.tarot-front img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}
.tarot-hint{
    margin-top:8px;
    font-size:.72rem;
    color:#7b6e6e;
    transition:.3s;
}
.tarot-meta{
    opacity:0;
    transform:translateY(6px);
    transition:.35s;
}
.tarot-card.revealed .tarot-meta{
    opacity:1;
    transform:translateY(0);
}
.tarot-card.revealed .tarot-hint{
    opacity:.15;
}
.tarot-name{
    margin-top:8px;
    font-weight:500;
    font-size:.8rem;
}
.tarot-card .reversed{
    color:#b34e4e;
    font-size:.7rem;
    margin-top:4px;
}
.tarot-change-image{
    margin-top:8px;
    border:none;
    background:#d2e6ec;
    padding:6px 10px;
    border-radius:14px;
    cursor:pointer;
    font-size:.7rem;
}
.tarot-change-image:hover{
    background:#e1b2b2;
    color:#fff;
}
.question-input{
    width:100%;
    padding:10px;
    border-radius:40px;
    border:1px solid #d2e6ec;
    margin:12px 0;
    outline:none;
}
.tarot-buttons{
    display:flex;
    gap:16px;
    justify-content:center;
}

/* ---------------- 其它设置 ---------------- */
.double-buttons{
    display:flex;
    gap:12px;
    margin:20px 0;
    flex-wrap:wrap;
}
.big-icon-btn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#d2e6ec;
    border:none;
    border-radius:20px;
    padding:16px 8px;
    cursor:pointer;
}
.big-icon-btn:hover{
    background:#e1b2b2;
    color:#fff;
}
.slider-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:12px 0;
}
.slider-row label{
    width:80px;
}
.color-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:8px 0;
}
.color-row label{
    width:70px;
}
.theme-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:16px 0;
}
.theme-item{
    aspect-ratio:1/1;
    border-radius:12px;
    border:2px solid transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:.7rem;
    color:#fff;
    text-shadow:0 0 2px rgba(0,0,0,.3);
}
.receipt-options{
    display:flex;
    gap:20px;
    margin:12px 0;
}
.receipt-option{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    padding:4px 12px;
    border-radius:20px;
    background:rgba(255,255,255,.5);
}
.receipt-option.selected{
    background:#e1b2b2;
    color:#fff;
}
.receipt-option input{
    display:none;
}
.switch-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:12px 0;
}
.switch{
    position:relative;
    display:inline-block;
    width:44px;
    height:24px;
}
.switch input{
    opacity:0;
    width:0;
    height:0;
}
.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background-color:#ccc;
    transition:.2s;
    border-radius:24px;
}
.slider:before{
    position:absolute;
    content:"";
    height:18px;
    width:18px;
    left:3px;
    bottom:3px;
    background-color:white;
    transition:.2s;
    border-radius:50%;
}
input:checked + .slider{
    background-color:#e1b2b2;
}
input:checked + .slider:before{
    transform:translateX(20px);
}

/* ---------------- 菜单 ---------------- */
.group-selector-menu{
    position:fixed;
    background:#fff;
    border-radius:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    padding:8px;
    z-index:3000;
    border:1px solid #d2e6ec;
    min-width:140px;
}
.group-selector-menu button{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:8px 12px;
    border-radius:16px;
    cursor:pointer;
}
.group-selector-menu button:hover:not(:disabled){
    background:#e1b2b2;
    color:#fff;
}
.group-selector-menu button:disabled{
    opacity:.6;
    cursor:default;
}

.message-actions-menu{
    position:fixed;
    z-index:4000;
    background:#fff;
    border:1px solid #d2e6ec;
    border-radius:18px;
    padding:8px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    min-width:160px;
    flex-direction:column;
    gap:6px;
}
.message-actions-menu button{
    background:#f1f5f6;
    border:none;
    width:100%;
    height:auto;
    border-radius:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    text-align:left;
    color:#4a453e;
}
.message-actions-menu button:hover{
    background:#e1b2b2;
    color:#fff;
}
.message-actions-menu button.danger:hover{
    background:#b34e4e;
    color:#fff;
}

@media (max-width:480px){
    .panel{
        width:94%;
        padding:16px;
    }
    .chat-header{
        padding:8px 10px;
    }
    .messages-container{
        padding:12px;
    }
}
</style>
</head>
<body>

<div class="startup-screen" id="startup-screen">
    <div class="startup-card">
        <div class="startup-icon" id="startup-icon"></div>

/* ----------------------------- 工具函数 ----------------------------- */
function readJSON(key, fallback){
    try{
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
    }catch(err){
        return fallback;
    }
}
function uid(prefix){
    return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
}
function escapeHtml(s){
    if(s == null) return "";
    return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
}
function getCurrentTime(){
    return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
}
function getInitials(n){
    return n ? String(n).charAt(0).toUpperCase() : "?";
}
function hexToRgba(hex, op){
    if(!hex) return `rgba(0,0,0,${op ?? 1})`;
    let value = String(hex).trim();
    if(/^#([0-9a-fA-F]{3})$/.test(value)){
        value = "#" + value.slice(1).split("").map(ch=>ch+ch).join("");
    }
    if(!/^#([0-9a-fA-F]{6})$/.test(value)) return `rgba(0,0,0,${op ?? 1})`;
    const r = parseInt(value.slice(1,3),16);
    const g = parseInt(value.slice(3,5),16);
    const b = parseInt(value.slice(5,7),16);
    return `rgba(${r},${g},${b},${op ?? 1})`;
}
function randomOrientation(){
    return Math.random() < .5 ? "正位" : "逆位";
}
function getTarotImage(name){
    return localStorage.getItem(`tarot_img_${name}`) || `https://picsum.photos/seed/${encodeURIComponent(name)}/100/160`;
}
function formatShortDateTime(str){
    const d = new Date(str || Date.now());
    if(Number.isNaN(d.getTime())) return "";
    return d.toLocaleString([],{
        month:"2-digit",
        day:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}
function getTimestamp(contact){
    const t = Date.parse(contact.lastActive || contact.createdAt || 0);
    return Number.isNaN(t) ? 0 : t;
}
function getSortedContacts(){
    return [...contacts].sort((a,b)=>{
        const pinDiff = Number(!!b.pinned) - Number(!!a.pinned);
        if(pinDiff !== 0) return pinDiff;
        return getTimestamp(b) - getTimestamp(a);
    });
}
function touchContact(contact){
    if(contact) contact.lastActive = new Date().toISOString();
}

}
function getCurrentColors(){
    if(settings.themeIndex !== -1 && themes[settings.themeIndex]) return themes[settings.themeIndex];

function hideMsgMenu(){

function uniqueGroupId(preferredId){
    if(preferredId && !groups.some(g=>g.id === preferredId)) return preferredId;
    return uid("g");
}
function uniqueWordCardId(preferredId){
    if(preferredId && !wordCards.some(c=>c.id === preferredId)) return preferredId;
    return uid("wc");
}
function ensureGroupByName(name, preferredId){
    const trimmed = String(name || "").trim();
    if(!trimmed) return "default";
    const existing = groups.find(g=>g.name === trimmed);
    if(existing) return existing.id;
    const id = uniqueGroupId(preferredId);
    groups.push({ id, name: trimmed });
    return id;
}
function downloadJson(filename, data){
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 800);
}
function pickDifferentIndex(length, storageKey){
    const prev = Number(localStorage.getItem(storageKey));
    let idx = Math.floor(Math.random() * length);
    if(length > 1){
        while(idx === prev){
            idx = Math.floor(Math.random() * length);
        }
    }
    localStorage.setItem(storageKey, String(idx));
    return idx;
}

/* ----------------------------- 聊天渲染 ----------------------------- */
function renderNoContact(){
    hideMsgMenu();
    quotedMessage = null;

    const peerName = document.getElementById("peer-name");
    const peerStatus = document.getElementById("peer-status");
    const peerAvatar = document.getElementById("peer-avatar");
    const selfName = document.getElementById("self-name");
    const selfStatus = document.getElementById("self-status");
    const selfAvatar = document.getElementById("self-avatar");
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-message-btn");
    const container = document.getElementById("messages-container");

    if(peerName) peerName.textContent = "未选择";
    if(peerStatus) peerStatus.textContent = "请先创建会话";
    if(peerAvatar){
        peerAvatar.innerHTML = "";
        peerAvatar.textContent = "?";
    }
    if(selfName) selfName.textContent = "念培";
    if(selfStatus) selfStatus.textContent = "";
    if(selfAvatar){
        selfAvatar.innerHTML = "";
        selfAvatar.textContent = "我";
    }
    if(input){
        input.value = "";
        input.disabled = true;
    }
    refreshInputPlaceholder();
    if(sendBtn) sendBtn.disabled = true;
    if(container) container.innerHTML = '<div class="empty-chat-placeholder">请先点击通讯录创建或选择一个会话</div>';
}
function refreshChat(){
    hideMsgMenu();

    const contact = contacts.find(c=>c.id === selectedContactId);
    const input = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-message-btn");
    const container = document.getElementById("messages-container");
    if(!container) return;

    const colors = getCurrentColors();
    document.documentElement.style.setProperty("--bubble-font-size", settings.bubbleFontSize + "rem");
    document.documentElement.style.setProperty("--name-font-size", settings.nameFontSize + "rem");
    document.documentElement.style.setProperty("--header-color", colors.headerColor || defaultSettings.customColors.headerColor);

    if(!contact){
        renderNoContact();
        return;
    }

    if(input) input.disabled = false;
    if(sendBtn) sendBtn.disabled = false;
    refreshInputPlaceholder();

    document.getElementById("peer-name").textContent = contact.peerName || "对方";
    document.getElementById("peer-status").textContent = contact.peerStatus || "";
    document.getElementById("self-name").textContent = contact.selfName || "我";
    document.getElementById("self-status").textContent = contact.selfStatus || "";

    const peerAv = document.getElementById("peer-avatar");
    const selfAv = document.getElementById("self-avatar");

    if(contact.peerAvatar){
        peerAv.innerHTML = `<img src="${contact.peerAvatar}" alt="peer">`;
    }else{
        peerAv.innerHTML = "";
        peerAv.textContent = getInitials(contact.peerName);
    }
    if(contact.selfAvatar){
        selfAv.innerHTML = `<img src="${contact.selfAvatar}" alt="self">`;
    }else{
        selfAv.innerHTML = "";
        selfAv.textContent = getInitials(contact.selfName);
    }

    const msgs = Array.isArray(contact.messages) ? contact.messages : [];
    let html = "";

    msgs.forEach((msg, idx)=>{
        const senderClass = msg.sender === "me" ? "me" : "contact";
        const quoteHtml = (msg.quote && settings.quoteEnabled)
            ? `<div class="quote-indicator"><i class="fa-solid fa-reply"></i> ${escapeHtml(msg.quote.text)}</div>`
            : "";

        let receiptHtml = "";
        if(msg.sender === "me" && msg.receipt){
            receiptHtml = settings.receiptStyle === "text"
                ? `<span class="receipt">已读</span>`
                : `<span class="receipt ${msg.receipt === "read" ? "read" : ""}"><i class="fa-solid fa-check-double"></i></span>`;
        }

        const bgColor = msg.sender === "me" ? colors.myBubble : colors.otherBubble;
        const textColor = msg.sender === "me" ? colors.myText : colors.otherText;
        const bubbleStyle = `background:${hexToRgba(bgColor, settings.customColors.bubbleOpacity)};color:${textColor};`;
        const metaText = `${msg.time || ""}${msg.edited ? " · 已编辑" : ""}`;

        html += `
            <div class="message-row ${senderClass}" data-msg-idx="${idx}">
                <div class="message-bubble" style="${bubbleStyle}">
                    ${quoteHtml}
                    <div class="message-text">${escapeHtml(msg.text || "")}</div>
                    <div class="message-time">
                        <span>${escapeHtml(metaText)}</span>
                        ${receiptHtml}
                    </div>
                </div>
            </div>
        `;
    });

    html += `
        <div class="typing-indicator ${pendingReplies > 0 ? "show" : ""}" id="typing-indicator">
            <div class="typing-bubble"><span></span><span></span><span></span></div>
        </div>
    `;

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;

    container.querySelectorAll(".message-bubble").forEach(bubble=>{
        bubble.addEventListener("click", e=>{
            e.stopPropagation();
            const row = bubble.closest(".message-row");
            if(!row) return;
            const idx = Number(row.dataset.msgIdx);
            const msg = contact.messages[idx];
            if(!msg) return;

            const rect = bubble.getBoundingClientRect();
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || rect.bottom;
            showMsgMenu(x, y, idx, msg);
        });
    });
}
function showMsgMenu(x, y, idx, msg){
    hideMsgMenu();

    const menu = document.getElementById("message-actions-menu");
    if(!menu) return;

    menu.innerHTML = `
        <button id="action-quote"><i class="fa-solid fa-reply"></i><span>引用消息</span></button>
        <button id="action-edit"><i class="fa-regular fa-pen-to-square"></i><span>编辑消息</span></button>
        <button id="action-delete" class="danger"><i class="fa-regular fa-trash-can"></i><span>删除消息</span></button>
    `;
    menu.style.display = "flex";
    menu.style.visibility = "hidden";

    requestAnimationFrame(()=>{
        const rect = menu.getBoundingClientRect();
        const margin = 10;
        const left = Math.max(margin, Math.min(x, window.innerWidth - rect.width - margin));
        const top = Math.max(margin, Math.min(y, window.innerHeight - rect.height - margin));
        menu.style.left = left + "px";
        menu.style.top = top + "px";
        menu.style.visibility = "visible";
    });

    document.getElementById("action-quote").onclick = ()=>{
        if(settings.quoteEnabled){
            quotedMessage = { text: msg.text || "", sender: msg.sender || "contact" };
            refreshInputPlaceholder();
            const input = document.getElementById("message-input");
            if(input) input.focus();
        }else{
            alert("你已关闭引用回复功能");
        }
        hideMsgMenu();
    };

    document.getElementById("action-edit").onclick = ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const current = contact.messages[idx];
        if(!current) return;
        const newText = prompt("编辑消息", current.text || "");
        if(newText === null){
            hideMsgMenu();
            return;
        }
        const trimmed = newText.trim();
        if(!trimmed){
            alert("消息内容不能为空");
            return;
        }
        current.text = trimmed;
        current.edited = true;
        touchContact(contact);
        saveAll();
        refreshChat();
        hideMsgMenu();
    };

    document.getElementById("action-delete").onclick = ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        if(confirm("删除消息？")){
            contact.messages.splice(idx, 1);
            touchContact(contact);
            saveAll();
            refreshChat();
        }
        hideMsgMenu();
    };

    activeMenuCloseHandler = (ev)=>{
        if(!menu.contains(ev.target)){
            hideMsgMenu();
        }
    };
    setTimeout(()=>{
        if(activeMenuCloseHandler){
            window.addEventListener("click", activeMenuCloseHandler, true);
        }
    }, 10);
}
function sendMessage(){
    const contactId = selectedContactId;
    const contact = contacts.find(c=>c.id === contactId);
    const input = document.getElementById("message-input");
    if(!contact || !input) return;

    const text = input.value.trim();
    if(!text) return;

    const newMsg = {
        sender:"me",
        text,
        time:getCurrentTime(),
        quote: quotedMessage ? { text: quotedMessage.text, sender: quotedMessage.sender } : null,
        receipt:null,
        edited:false
    };

    contact.messages.push(newMsg);
    touchContact(contact);
    pendingReplies++;

    quotedMessage = null;
    input.value = "";
    refreshInputPlaceholder();

    saveAll();
    refreshChat();

    const min = Math.min(settings.minWait, settings.maxWait);
    const max = Math.max(settings.minWait, settings.maxWait);
    const wait = Math.random() * ((max * 1000) - (min * 1000)) + (min * 1000);

    setTimeout(()=>{
        const liveContact = contacts.find(c=>c.id === contactId);
        pendingReplies = Math.max(0, pendingReplies - 1);

        if(!liveContact){
            refreshChat();
            return;
        }

        newMsg.receipt = "read";
        const replyText = wordCards.length
            ? wordCards[Math.floor(Math.random() * wordCards.length)].text
            : "...";

        liveContact.messages.push({
            sender:"contact",
            text:replyText,
            time:getCurrentTime(),

function renderWordCards(){
    const listDiv = document.getElementById("wordcard-list");
    if(!listDiv) return;

    const keyword = wordcardSearchKeyword.trim().toLowerCase();
    let filtered = currentGroupFilter === "all"
        ? [...wordCards]
        : wordCards.filter(c=>c.groupId === currentGroupFilter);

    if(keyword){
        filtered = filtered.filter(card=>{
            const groupName = groups.find(g=>g.id === card.groupId)?.name || "默认";
            return String(card.text).toLowerCase().includes(keyword) || String(groupName).toLowerCase().includes(keyword);
        });
    }

    if(!filtered.length){
        listDiv.innerHTML = `<div style="color:#8a8a8a;text-align:center;">${keyword ? "没有匹配字卡" : "暂无字卡"}</div>`;
        return;
    }

    let html = "";
    filtered.forEach(card=>{
        const groupName = groups.find(g=>g.id === card.groupId)?.name || "默认";
        html += `
            <div class="wordcard-item" data-id="${card.id}">
                <span class="wordcard-text">
                    ${escapeHtml(card.text)}
                    <span class="wordcard-group-badge">${escapeHtml(groupName)}</span>
                </span>
                <div>
                    <button class="move-wordcard" title="移动分组"><i class="fa-solid fa-folder-open"></i></button>
                    <button class="edit-wordcard" title="编辑"><i class="fa-regular fa-pen-to-square"></i></button>
                    <button class="delete-wordcard" title="删除"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>
        `;
    });

    listDiv.innerHTML = html;

    listDiv.querySelectorAll(".wordcard-text").forEach(el=>{
        el.addEventListener("click", ()=>{
            const id = el.closest(".wordcard-item")?.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            const input = document.getElementById("message-input");
            if(card && input){
                input.value = card.text;
                closeOverlay("wordcard-overlay");
                input.focus();
            }
        });
    });

    listDiv.querySelectorAll(".edit-wordcard").forEach(btn=>{
        btn.addEventListener("click", ()=>{
            const id = btn.closest(".wordcard-item")?.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            if(!card) return;
            const newText = prompt("修改字卡", card.text);
            if(newText === null) return;
            const trimmed = newText.trim();
            if(!trimmed) return;
            card.text = trimmed;
            saveAll();
            renderWordCards();
        });
    });

    listDiv.querySelectorAll(".delete-wordcard").forEach(btn=>{
        btn.addEventListener("click", ()=>{
            const id = btn.closest(".wordcard-item")?.dataset.id;
            if(confirm("删除字卡？")){
                wordCards = wordCards.filter(c=>c.id !== id);
                saveAll();
                renderWordCards();
            }
        });
    });

    listDiv.querySelectorAll(".move-wordcard").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.stopPropagation();
            const id = btn.closest(".wordcard-item")?.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            if(!card) return;

            const menu = document.createElement("div");
            menu.className = "group-selector-menu";

            const rect = btn.getBoundingClientRect();
            menu.style.left = rect.left + "px";
            menu.style.top = (rect.bottom + 5) + "px";

            const targetGroups = groups.filter(g=>g.id !== card.groupId);
            if(!targetGroups.length){
                const empty = document.createElement("button");
                empty.textContent = "没有其它分组";
                empty.disabled = true;
                menu.appendChild(empty);
            }else{
                targetGroups.forEach(g=>{
                    const opt = document.createElement("button");
                    opt.textContent = g.name;
                    opt.onclick = ()=>{
                        card.groupId = g.id;
                        saveAll();
                        renderWordCards();
                        menu.remove();
                    };
                    menu.appendChild(opt);
                });
            }

            document.body.appendChild(menu);

            const removeMenu = (ev)=>{
                if(!menu.contains(ev.target)){
                    menu.remove();
                    document.removeEventListener("click", removeMenu);
                }
            };
            setTimeout(()=>document.addEventListener("click", removeMenu), 10);
        });
    });

function importWordCardsFromParsed(data){
    const groupCountBefore = groups.length;
    let importedCards = 0;
    const groupIdMap = {};

    const registerGroup = (raw)=>{
        if(!raw) return null;

        let oldId = null;
        let name = "";

        if(typeof raw === "string"){
            name = raw.trim();
        }else if(typeof raw === "object"){
            oldId = raw.id ? String(raw.id) : null;
            name = String(raw.name || "").trim();
        }
        if(!name) return null;

        const existingByName = groups.find(g=>g.name === name);
        if(existingByName){
            if(oldId) groupIdMap[oldId] = existingByName.id;
            return existingByName.id;
        }

        const id = uniqueGroupId(oldId);
        groups.push({ id, name });
        if(oldId) groupIdMap[oldId] = id;
        return id;
    };

    if(data && typeof data === "object" && !Array.isArray(data) && Array.isArray(data.groups)){
        data.groups.forEach(registerGroup);
    }

    let cards = [];
    if(Array.isArray(data)){
        cards = data;
    }else if(data && typeof data === "object"){
        cards = data.wordCards || data.cards || data.items || [];
    }else{
        throw new Error("JSON 格式不正确");
    }

    if(!Array.isArray(cards)) throw new Error("字卡数据必须是数组");

    cards.forEach(item=>{
        let text = "";
        let groupId = "default";
        let preferredId = null;

        if(typeof item === "string"){
            text = item.trim();
        }else if(item && typeof item === "object"){
            preferredId = item.id ? String(item.id) : null;
            text = String(item.text ?? item.content ?? "").trim();

            if(item.groupId){
                const rawGroupId = String(item.groupId);
                if(groups.some(g=>g.id === rawGroupId)){
                    groupId = rawGroupId;
                }else if(groupIdMap[rawGroupId]){
                    groupId = groupIdMap[rawGroupId];
                }
            }
            if(groupId === "default" && item.groupName){
                groupId = ensureGroupByName(item.groupName);
            }
        }

        if(text){
            wordCards.push({
                id: uniqueWordCardId(preferredId),
                text,
                groupId
            });
            importedCards++;
        }
    });

    return {
        importedCards,
        importedGroups: groups.length - groupCountBefore
    };
}
function importWordCards(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";

    input.onchange = e=>{
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = ev=>{
            try{
                const data = JSON.parse(ev.target.result);
                const result = importWordCardsFromParsed(data);
                saveAll();
                updateGroupSelect();
                renderGroupTabs();
                renderWordCards();
                alert(`导入成功：${result.importedCards} 张字卡，${result.importedGroups} 个新分组`);
            }catch(err){
                alert('导入失败：请使用 JSON 数组，或 { groups:[], wordCards:[] } 格式。');
            }
        };
        reader.readAsText(file, "utf-8");
    };

    input.click();
}

/* ----------------------------- 初始化数据 ----------------------------- */
function initData(){
    contacts = readJSON("orchard_contacts", []);
    if(!Array.isArray(contacts)) contacts = [];

    const legacySeedTexts = ["今天果园的椰子熟了"];
    contacts.forEach(contact=>{
        if(!Array.isArray(contact.messages)) contact.messages = [];
        const joined = contact.messages.map(m=>String(m.text || "")).join("||");
        if(legacySeedTexts.some(t=>joined.includes(t))){
            contact.messages = [];
        }
    });

    if(!contacts.length){
        const now = new Date().toISOString();
        contacts = [{
            id:"c1",
            peerName:"陆沉",
            peerAvatar:null,
            peerStatus:"在线",
            selfName:"念培",
            selfAvatar:null,
            selfStatus:"想喝椰汁",
            createdAt:now,
            lastActive:now,
            pinned:false,
            messages:[]
        }];
        selectedContactId = "c1";
    }else{
        contacts.forEach(contact=>{
            if(!Array.isArray(contact.messages)) contact.messages = [];
            if(typeof contact.pinned !== "boolean") contact.pinned = false;
            if(!contact.createdAt) contact.createdAt = new Date().toISOString();
            if(!contact.lastActive) contact.lastActive = contact.createdAt;
        });

        selectedContactId = localStorage.getItem("orchard_selected");
        if(!selectedContactId || !contacts.find(c=>c.id === selectedContactId)){
            selectedContactId = getSortedContacts()[0]?.id || contacts[0]?.id || null;
        }
    }

    groups = readJSON("orchard_groups", []);
    if(!Array.isArray(groups)) groups = [];
    if(!groups.some(g=>g.id === "default")) groups.unshift({ id:"default", name:"默认" });

    wordCards = readJSON("orchard_wordcards_v2", []);
    if(!Array.isArray(wordCards)) wordCards = [];
    wordCards = wordCards.map((item, i)=>{
        if(typeof item === "string"){
            return { id: uid("wc") + "_" + i, text:item, groupId:"default" };
        }
        return {
            id: item.id || uid("wc") + "_" + i,
            text: item.text || "",
            groupId: item.groupId || "default"
        };
    }).filter(item=>item.text);

    if(!wordCards.length){
        wordCards = [
            { id:"wc1", text:"不来找我", groupId:"default" },
            { id:"wc2", text:"没好好照顾自己", groupId:"default" },
            { id:"wc3", text:"别喝冰的", groupId:"default" }
        ];
    }
    wordCards.forEach(c=>{
        if(!c.groupId || !groups.find(g=>g.id === c.groupId)) c.groupId = "default";
    });

    statuses = readJSON("orchard_statuses", []);
    if(!Array.isArray(statuses) || !statuses.length){
        statuses = ["在线","忙碌","想喝椰汁","发呆","开心"];
    }

    const storedSettings = readJSON("orchard_settings", null);
    if(storedSettings){
        settings = {
            ...defaultSettings,
            ...storedSettings,
            customColors:{
                ...defaultSettings.customColors,
                ...(storedSettings.customColors || {})
            }
        };
    }
}

/* ----------------------------- 绑定事件 ----------------------------- */
function bindEvents(){
    const $ = id => document.getElementById(id);

    $("send-message-btn").addEventListener("click", sendMessage);
    $("message-input").addEventListener("keypress", e=>{
        if(e.key === "Enter") sendMessage();
    });

    $("contact-icon").addEventListener("click", ()=>{
        renderContactList();
        openOverlay("contact-overlay");
    });

    $("wordcard-icon").addEventListener("click", ()=>{
        renderGroupTabs();
        updateGroupSelect();
        $("wordcard-search").value = wordcardSearchKeyword;
        renderWordCards();
        openOverlay("wordcard-overlay");
    });

    $("settings-icon").addEventListener("click", ()=>openOverlay("settings-main-overlay"));

    $("new-contact").addEventListener("click", createNewContact);
    $("add-wordcard").addEventListener("click", addWordCard);

    $("wordcard-search").addEventListener("input", e=>{
        wordcardSearchKeyword = e.target.value;
        renderWordCards();
    });

    $("upload-wordcard").addEventListener("click", importWordCards);
    $("export-wordcard").addEventListener("click", exportWordCards);

    $("add-status").addEventListener("click", ()=>{
        const el = $("new-status");
        const t = el.value.trim();
        if(!t) return;
        statuses.push(t);
        el.value = "";
        saveAll();
        renderStatusList(currentStatusTarget);
    });

    $("random-status").addEventListener("click", ()=>{
        if(!statuses.length) return;
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const r = statuses[Math.floor(Math.random() * statuses.length)];
        if(currentStatusTarget === "peer") contact.peerStatus = r;
        else contact.selfStatus = r;
        saveAll();
        refreshChat();
        closeOverlay("status-overlay");
    });

    document.querySelectorAll("#wordcard-close,#wordcard-close2").forEach(btn=>{
        btn.addEventListener("click", ()=>closeOverlay("wordcard-overlay"));
    });
    document.querySelectorAll("#contact-close,#contact-close2").forEach(btn=>{
        btn.addEventListener("click", ()=>closeOverlay("contact-overlay"));
    });
    document.querySelectorAll("#status-close,#status-close2").forEach(btn=>{
        btn.addEventListener("click", ()=>closeOverlay("status-overlay"));
    });
    document.querySelectorAll("#settings-close,#settings-close2").forEach(btn=>{
        btn.addEventListener("click", ()=>closeOverlay("settings-main-overlay"));
    });

    $("peer-avatar").addEventListener("click", ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = e=>{
            const f = e.target.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = ev=>{
                contact.peerAvatar = ev.target.result;
                saveAll();
                refreshChat();
            };
            r.readAsDataURL(f);
        };
        input.click();
    });

    $("self-avatar").addEventListener("click", ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = e=>{
            const f = e.target.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = ev=>{
                contact.selfAvatar = ev.target.result;
                saveAll();
                refreshChat();
            };
            r.readAsDataURL(f);
        };
        input.click();
    });

    $("peer-name").addEventListener("click", ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const newName = prompt("修改对方昵称", contact.peerName);
        if(newName === null) return;
        const trimmed = newName.trim();
        if(!trimmed) return;
        contact.peerName = trimmed;
        saveAll();
        refreshChat();
        renderContactList();
    });

    $("self-name").addEventListener("click", ()=>{
        const contact = contacts.find(c=>c.id === selectedContactId);
        if(!contact) return;
        const newName = prompt("修改我的昵称", contact.selfName);
        if(newName === null) return;
        const trimmed = newName.trim();
        if(!trimmed) return;
        contact.selfName = trimmed;
        saveAll();
        refreshChat();
    });

    $("peer-status").addEventListener("click", ()=>{
        if(!contacts.find(c=>c.id === selectedContactId)) return;
        currentStatusTarget = "peer";
        renderStatusList(currentStatusTarget);
        openOverlay("status-overlay");
    });

    $("self-status").addEventListener("click", ()=>{

    /* 外观设置 */

            refreshChat();
        });
    });

        settings.minWait = parseFloat(e.target.value);
        if(settings.minWait > settings.maxWait){
            settings.maxWait = settings.minWait;
            $("max-wait").value = settings.maxWait;
            $("max-wait-val").textContent = settings.maxWait + "s";
        }
        $("min-wait-val").textContent = settings.minWait + "s";
        saveAll();
    });

    $("max-wait").addEventListener("input", e=>{

            e.target.value = settings.maxWait;
        }
        $("max-wait-val").textContent = settings.maxWait + "s";
        saveAll();
    });

    /* 塔罗 */
    $("open-tarot").addEventListener("click", ()=>{
        closeOverlay("settings-main-overlay");
        openOverlay("tarot-overlay");
    });
    $("draw-one").addEventListener("click", ()=>drawTarot(1));
    $("draw-three").addEventListener("click", ()=>drawTarot(3));
    $("tarot-close").addEventListener("click", ()=>closeOverlay("tarot-overlay"));
    $("tarot-close2").addEventListener("click", ()=>closeOverlay("tarot-overlay"));
    $("tarot-back").addEventListener("click", ()=>{
        closeOverlay("tarot-overlay");
        openOverlay("settings-main-overlay");
    });

    /* 浮层空白处关闭 */
    document.querySelectorAll(".overlay").forEach(overlay=>{
        overlay.addEventListener("click", e=>{
            if(e.target === overlay) closeOverlay(overlay.id);
        });
    });

    /* ESC */
    document.addEventListener("keydown", e=>{
        if(e.key === "Escape"){
            const opened = [...document.querySelectorAll(".overlay.show")];
            if(opened.length){
                closeOverlay(opened[opened.length - 1].id);
            }
            hideMsgMenu();
        }
    });
}

/* ----------------------------- 启动 ----------------------------- */
setupStartupScreen();
initData();
buildUI();
bindEvents();
renderThemeGrid();
syncColorInputs();
applyBgAndFont();

const startupDelay = 1100 + Math.floor(Math.random() * 900);
window.addEventListener("load", ()=>{
    setTimeout(hideStartupScreen, startupDelay);
});
setTimeout(hideStartupScreen, 4200);

})();
</script>
</body>
</html>
